# .github/workflows/build.yml
---
name: Build and Push Container Image

on:
  workflow_dispatch:
  push:
    branches:
      - ci-verify

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version.py
        id: version
        run: |
          VERSION=$(python -c "import version; print(version.VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          BRANCH="${{ github.ref_name }}"
          # Sanitize branch name: replace any character that is not alphanumeric,
          # hyphen, or period with a hyphen, then strip leading/trailing hyphens.
          SAFE_BRANCH=$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//')
          # GHCR requires lowercase repository names
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          if [ "${BRANCH}" = "main" ]; then
            TAGS="${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:latest"
          else
            TAGS="${IMAGE}:${SAFE_BRANCH}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Expose tag for downstream jobs
        id: out
        run: echo "tag=${{ steps.tags.outputs.tags }}" >> "$GITHUB_OUTPUT"
    outputs:
      tags: ${{ steps.tags.outputs.tags }}

  inspect:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull image
        run: |
          IMAGE=$(echo "${{ needs.build-and-push.outputs.tags }}" | cut -d',' -f1)
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker pull "${IMAGE}"
      - name: Inspect /app/ai-toolkit/
        run: |
          set -x
          docker run --rm "${IMAGE}" bash -c "cd /app/ai-toolkit && git remote -v 2>/dev/null || echo '(no .git in image)'"
          docker run --rm "${IMAGE}" bash -c "cd /app/ai-toolkit && git log -1 --oneline 2>/dev/null || echo '(no .git in image)'"
          docker run --rm "${IMAGE}" bash -c "ls /app/ai-toolkit/toolkit/ | grep -iE 'perceptual|depth_id|normal_id' || echo 'NONE FOUND'"
          docker run --rm "${IMAGE}" bash -c "ls /app/ai-toolkit/config/examples/ | grep -i flux2_klein || echo 'NONE FOUND'"
          docker run --rm "${IMAGE}" head -5 /app/ai-toolkit/README.md
          docker run --rm "${IMAGE}" sha256sum /app/ai-toolkit/requirements.txt
# EOF .github/workflows/build.yml
