# Diffusion-only baseline — no skeleton loss, weight=1.0, 1000 steps.
# Apples-to-apples comparison vs skeleton_motion_only_w5t01_b2_dl01_500 run.
---
job: extension
config:
  name: "diff_only_w1_1000"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 100
        max_step_saves_to_keep: 3
      datasets:
        - folder_path: "test_data/dance_train"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          cache_latents_to_disk: true
          resolution: [ 256 ]
          num_frames: 65
          shrink_video_to_frames: true
      train:
        batch_size: 2
        steps: 1000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        timestep_type: 'linear'
        optimizer: "adamw8bit"
        lr: 1e-4
        optimizer_params:
          weight_decay: 1e-4
        skip_first_sample: true
        dtype: bf16
        diffusion_loss_weight: 1.0
        min_denoising_steps: 0
        max_denoising_steps: 1000
        cache_text_embeddings: true
      model:
        name_or_path: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
        arch: 'wan21'
        quantize_te: true
      sample:
        sampler: "flowmatch"
        sample_every: 100
        width: 512
        height: 512
        num_frames: 65
        fps: 16
        prompts:
          - "a man dancing in an empty warehouse"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 5
        sample_steps: 30
meta:
  name: "[name]"
  version: '1.0'
